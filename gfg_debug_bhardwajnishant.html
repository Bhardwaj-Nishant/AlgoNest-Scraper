intain consistency in style, branding, and visual quality across projects.\u003c/p\u003e\u003cp class=\"p1\"\u003e* Generate multiple image variations based on creative requirements.\u003c/p\u003e\u003cp class=\"p1\"\u003eResearch \u0026amp; Analysis\u003c/p\u003e\u003cp class=\"p1\"\u003e* Conduct research on current design trends, AI image styles, and industry best practices.\u003c/p\u003e\u003cp class=\"p1\"\u003e* Analyze competitor visuals and identify opportunities for improvement.\u003c/p\u003e\u003cp class=\"p1\"\u003e* Research references, concepts, color palettes, compositions, and design inspirations before image creation.\u003c/p\u003e\u003cp class=\"p1\"\u003e* Stay updated with the latest AI tools, image generation models, and prompt engineering techniques.\u003c/p\u003e\u003cp class=\"p1\"\u003ePrompt Engineering\u003c/p\u003e\u003cp class=\"p1\"\u003e* Develop, test, and refine prompts for different AI image generation platforms.\u003c/p\u003e\u003cp class=\"p1\"\u003e* Experiment with advanced prompting techniques to achieve accurate and high-quality outputs.\u003c/p\u003e\u003cp class=\"p1\"\u003e* Build and maintain a prompt library for future projects.\u003c/p\u003e\u003cp class=\"p1\"\u003eCollaboration\u003c/p\u003e\u003cp class=\"p1\"\u003e* Work closely with the Graphic Design, Marketing, Content, and Product teams.\u003c/p\u003e\u003cp class=\"p1\"\u003e* Understand project requirements and convert concepts into compelling visuals.\u003c/p\u003e\u003cp class=\"p1\"\u003e* Incorporate feedback and revise images efficiently.\u003c/p\u003e\u003cp class=\"p1\"\u003eRequired Skills\u003c/p\u003e\u003cp class=\"p1\"\u003e* Strong understanding of AI image generation tools such as:\u003c/p\u003e\u003cp class=\"p1\"\u003e* ChatGPT Image Generation\u003c/p\u003e\u003cp class=\"p1\"\u003e* Midjourney\u003c/p\u003e\u003cp class=\"p1\"\u003e* Flux\u003c/p\u003e\u003cp class=\"p1\"\u003e* Stable Diffusion\u003c/p\u003e\u003cp class=\"p1\"\u003e* Adobe Firefly\u003c/p\u003e\u003cp class=\"p1\"\u003e* Ideogram\u003c/p\u003e\u003cp class=\"p1\"\u003e* Leonardo AI\u003c/p\u003e\u003cp class=\"p1\"\u003e* Recraft AI\u003c/p\u003e\u003cp class=\"p1\"\u003e* Excellent prompt engineering skills.\u003c/p\u003e\u003cp class=\"p1\"\u003e* Strong research and analytical abilities.\u003c/p\u003e\u003cp class=\"p1\"\u003e* Good understanding of composition, lighting, colors, typography, and visual storytelling.\u003c/p\u003e\u003cp class=\"p1\"\u003e* Basic image editing skills using Photoshop, Photopea, Canva, or similar software.\u003c/p\u003e\u003cp class=\"p1\"\u003e* Ability to identify design trends and generate creative concepts.\u003c/p\u003e\u003cp class=\"p1\"\u003e* Strong attention to detail.\u003c/p\u003e\u003cp class=\"p1\"\u003e\u003cstrong\u003ePreferred Qualifications\u003c/strong\u003e\u003c/p\u003e\u003cp class=\"p1\"\u003e* Experience in Graphic Design, Visual Design, Digital Marketing, or a related field.\u003c/p\u003e\u003cp class=\"p1\"\u003e* Portfolio showcasing AI-generated images and prompt engineering work.\u003c/p\u003e\u003cp class=\"p1\"\u003e* Familiarity with branding, advertising creatives, and social media content.\u003c/p\u003e\u003cp class=\"p1\"\u003e* Knowledge of copyright, licensing, and ethical AI image usage.\u003c/p\u003e\u003cp class=\"p1\"\u003e\u003cstrong\u003eNice-to-Have Skills\u003c/strong\u003e\u003c/p\u003e\u003cp class=\"p1\"\u003e* Video generation using AI tools.\u003c/p\u003e\u003cp class=\"p1\"\u003e* AI avatar creation.\u003c/p\u003e\u003cp class=\"p1\"\u003e* Image upscaling and restoration.\u003c/p\u003e\u003cp class=\"p1\"\u003e* Background removal and compositing.\u003c/p\u003e\u003cp class=\"p1\"\u003e* Experience with automation tools and AI workflows.\u003c/p\u003e\u003cp class=\"p1\"\u003e\u003cstrong\u003eSoft Skills\u003c/strong\u003e\u003c/p\u003e\u003cp class=\"p1\"\u003e* Creative thinking.\u003c/p\u003e\u003cp class=\"p1\"\u003e* Problem-solving ability.\u0 r=\"ltr\"\u003e\u003cspan\u003eThe movement stays exactly the same.\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eOnly the calculation changes.\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eThat's called \u003c/span\u003e\u003cb\u003e\u003cstrong\u003ePattern Reuse\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cb\u003e\u003cstrong\u003eIntuition\u003c/strong\u003e\u003c/b\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eImagine you're counting people wearing \u003c/span\u003e\u003cb\u003e\u003cstrong\u003eblue shirts \u003c/strong\u003e\u003c/b\u003e\u003cspan\u003ein a moving bus.\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eEvery time the bus moves,\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eone passenger gets off,\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eone new passenger gets on.\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eYou don't recount everyone inside the bus.\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eYou simply ask:\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eDid the person leaving wear blue?\u003c/span\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cbr/\u003e\u003c/p\u003e\u003cp dir=\"ltr\"\u003e\u003cspan\u003eDid the new person wear blue?\u003c/span\u003e\u003c/p\u003
